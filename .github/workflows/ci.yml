name: Automation Test CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10 

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile 

      - name: Run Linter
        run: pnpm run lint

      - name: Run Unit Tests
        run: pnpm test